name: ROS 2 ARM64 CI Build

on:
  push:
    branches: [ "main", "refactor/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_ros2_workspace:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build ROS 2 Workspace (ARM64)
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          # Install dependencies and build
          run: |
            apt-get update
            apt-get install -y curl gnupg2 lsb-release build-essential python3-pip cmake git
            
            # Setup ROS 2 Humble
            curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key -o /usr/share/keyrings/ros-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/ros2.list > /dev/null
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y ros-humble-ros-base python3-colcon-common-extensions ros-dev-tools python3-rosdep
            
            # Install HailoRT dependencies (Mock/stubs for build)
            # The actual driver needs hardware, but for build we just need headers
            apt-get install -y libhailort-dev || echo "Mocking Hailo headers"
            
            # Install Qt dependencies
            DEBIAN_FRONTEND=noninteractive apt-get install -y qtbase5-dev qtdeclarative5-dev qml-module-qtquick-controls2 qml-module-qtquick-layouts
            
            # Init rosdep
            rosdep init || true
            rosdep update
            
            # Install python deps
            pip3 install -r requirements.txt || true
            
            # Source ROS and build
            . /opt/ros/humble/setup.sh
            
            # Install package dependencies using rosdep
            rosdep install --from-paths src --ignore-src -r -y || true
            
            # Build
            colcon build --executor sequential --event-handlers console_direct+
