# =============================================================================
# SENSOR CONFIGURATION — Cartridge Feeding System
# =============================================================================
# Phân chia:
# - CPX 253: Module 2 (I1.0-I1.7) và Module 3 (I2.0-I2.7)
# - CPX 254: Module 2 (I3.0-I3.7)
# =============================================================================

num_sensors: 22

sensor_type: PNP
sensor_logic: NO

sensors:
  # [CPX 253] MODULE 2: I1.0 -> I1.7
  - id: 1
    name: S1_BELT_START
    gui_label: "Belt start"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I1.0"
    desc: "phát hiện khay ở đầu băng tải đầu vào"
    pos: pos1
    role: conveyor
    used_in: ['IDLE']
    active: true

  - id: 2
    name: S2_BELT_MID
    gui_label: "Belt mid"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I1.1"
    desc: "phát hiện khay đang di chuyển"
    pos: pos1
    role: conveyor
    used_in: ['IDLE']
    active: true

  - id: 3
    name: S3_BELT_END
    gui_label: "Belt end"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I1.2"
    desc: "xác nhận khay đã tới cuối băng tải"
    pos: pos1
    role: conveyor
    used_in: ['IDLE']
    active: true

  - id: 4
    name: S4_SCAN_STACK_POS1
    gui_label: "Scan Stack Pos1"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I1.3"
    desc: "phát hiện chồng khay kim loại"
    pos: pos1
    role: stack_detect
    used_in: ['S1_INY_SCAN']
    active: true

  - id: 5
    name: S5_OUTPUT_DETECT
    gui_label: "Output det."
    cpx_ip: "192.168.27.253"
    cpx_channel: "I1.4"
    desc: "xác nhận khay vào vị trí nạp"
    pos: pos1
    role: tray_detect
    used_in: ['S1_CHECK_S5']
    active: true

  - id: 6
    name: S6_CHECK_TRAY_P1
    gui_label: "Check Tray OutP1"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I1.5"
    desc: "snapshot có khay"
    pos: pos1
    role: stack_detect
    used_in: ['S2A_CHECK_INTERLOCK']
    active: true

  - id: 7
    name: S7_TRAY_AT_ROBOT
    gui_label: "Khay tại Robot"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I1.6"
    desc: "xác nhận khay đã lên vị trí robot"
    pos: pos1
    role: tray_detect
    used_in: ['IDLE']
    active: true

  - id: 8
    name: S8_RESERVED
    gui_label: "[Reserved]"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I1.7"
    desc: "chưa sử dụng"
    pos: pos1
    role: unused
    used_in: []
    active: false

  # [CPX 253] MODULE 3: I2.0 -> I2.7
  - id: 9
    name: S9_CYL1_RETRACTED
    gui_label: "Cyl1 Ret"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I2.0"
    desc: "Cylinder 1 đã co lại hoàn toàn"
    pos: pos1
    role: cyl_retracted
    used_in: []
    active: true

  - id: 10
    name: S10_CYL1_EXTENDED
    gui_label: "Cyl1 Ext"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I2.1"
    desc: "Cylinder 1 đã đẩy ra hoàn toàn"
    pos: pos1
    role: cyl_extended
    used_in: []
    active: true

  - id: 11
    name: S11_ATV_RUN
    gui_label: "ATV Run"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I2.2"
    desc: "Đọc trạng thái ATV Run"
    pos: vfd
    role: vfd_monitor
    used_in: []
    active: true

  - id: 12
    name: S12_ATV_FAULT
    gui_label: "ATV Fault"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I2.3"
    desc: "Đọc trạng thái ATV Fault"
    pos: vfd
    role: vfd_monitor
    used_in: []
    active: true

  - id: 13
    name: S13_RESERVED
    gui_label: "[Reserved]"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I2.4"
    desc: "chưa sử dụng"
    pos: pos1
    role: unused
    used_in: []
    active: false

  - id: 14
    name: S14_RESERVED
    gui_label: "[Reserved]"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I2.5"
    desc: "chưa sử dụng"
    pos: pos1
    role: unused
    used_in: []
    active: false

  - id: 15
    name: S15_RESERVED
    gui_label: "[Reserved]"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I2.6"
    desc: "chưa sử dụng"
    pos: pos1
    role: unused
    used_in: []
    active: false

  - id: 16
    name: S16_RESERVED
    gui_label: "[Reserved]"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I2.7"
    desc: "chưa sử dụng"
    pos: pos1
    role: unused
    used_in: []
    active: false

  # [CPX 254] MODULE 2: I3.0 -> I3.7
  - id: 17
    name: S17_PLATFORM
    gui_label: "Platform"
    cpx_ip: "192.168.27.254"
    cpx_channel: "I3.0"
    desc: "khay đã lên Platform"
    pos: pos2
    role: tray_detect
    used_in: []
    active: true

  - id: 18
    name: S18_FEED_OK
    gui_label: "Feed OK"
    cpx_ip: "192.168.27.254"
    cpx_channel: "I3.1"
    desc: "xác nhận cấp khay"
    pos: pos2
    role: tray_detect
    used_in: []
    active: true

  - id: 19
    name: S19_CHECK_TRAY_P2
    gui_label: "Check Tray OutP2"
    cpx_ip: "192.168.27.254"
    cpx_channel: "I3.2"
    desc: "xác nhận có khay"
    pos: pos2
    role: stack_detect
    used_in: []
    active: true

  - id: 20
    name: S20_SCAN_STACK_POS2
    gui_label: "Scan Stack Pos2"
    cpx_ip: "192.168.27.254"
    cpx_channel: "I3.3"
    desc: "OutY phát hiện cạnh"
    pos: pos2
