  - id: 22
    name: S22_CYL2_EXTENDED
    gui_label: "Cyl2 Ext"
    cpx_ip: "192.168.27.254"
    cpx_channel: "I3.5"
    desc: "Cylinder 2 đẩy ra"
    pos: pos2
    role: cyl_extended
