cylinder1_extend_channel: 4
cylinder1_retract_channel: 5
cylinder3_extend_channel: 6
cylinder3_retract_channel: 7
cylinder2_retract_channel: 8
cylinder2_extend_channel: 9

# Cyl3 hardware toggle — true = bật full safety (S15/S16 interlock + S13/S14 watchdog + Cyl3 extend step)
# false = bypass row1 interlock + skip Cyl3 extend (chỉ dùng khi hardware Cyl3 chưa đấu nối)
cyl3_present: true

# Cụm output stack toggle — true = bật STATE 3/4 (cần Servo3+OutX+OutY+CPX 254 lắp đủ)
# false = disable auto-trigger và khóa nút manual STATE 3/4. STATE 1/2 (Pos1) không bị ảnh hưởng.
output_stack_present: false

# Velocity (m/s) — synced with FAS
fas_position_velocity: 0.05   # Fixed velocity for position moves (m/s) — match FAS setting
jog_velocity: 0.05            # Default JOG velocity (m/s)
jog_velocity_max: 0.08        # Max allowed JOG velocity (m/s) — matches drive max 80mm/s

# Axis Coordinate Mapping (mm)
inx_home: 0.0              # Home position for INX
inx_safe: -60.0              # Safe position for INX (used when iny_safe_zone is active)
inx_target2: 503         # Position 2 for S1 loading
inx_output_stack: -293.0    # Tray stacking position for empty tray
iny_home: 0.0              # Home/Neutral position for INY
iny_safe_zone: 90.0        # Limit for "Safe" INY position before INX moves (Safety interlock — block INX khi INY > giá trị này)
iny_push_clearance_mm: 5.0  # INY dừng tạm để kẹp trước khi đẩy vào robot (S1 step trung gian)

# S1 INY Scanning Logic
iny_target2: 80.0          # Tọa độ INY đẩy khay vào robot / kẹp khay cũ (S1 & S2A)
target_scaninp1: 970.0       # Scan endpoint target (mm)
target_scanoutp1: 970.0
iny_scan_vel: 70             # Scanning speed (mm/s)
iny_row_vel: 30              # Docking speed (mm/s)
iny_scan_valid_min_mm: 70.0 # Ignore triggers below this X coordinate (Noise filter)
iny_scan_valid_max_mm: 980.0 # Valid scan range upper limit
s1_scan_noise_retry_limit: 1 # Max automatic retries if noise is detected
inx_noise_recovery_mm: 10.0  # Safe INX recovery pos during noise failure

