position_tolerance: 2.0    # mm — sai số cho phép coi servo "đã thực sự đến target"
                            # (dùng trong _at_position() / _s1_wait_arrive / gate S4).
                            # Đặt thấp = chặt = chờ servo settle đúng vị trí trước khi sang
                            # state nguy hiểm. Tăng nếu drive overshoot nhiều và retry vô ích.
outx_safe_position_threshold: 100.0
max_trays: 8
max_slots_per_output_tray: 9
homing_timeout: 120.0
move_timeout: 80.0
cylinder_timeout: 70.0
# --------------------------------------------------------------------------
# LƯU Ý QUAN TRỌNG VỀ NETWORK TIMEOUT (Anti-Deadlock Modbus)
# - modbus_timeout_ms (mặc định: 3000ms):
#   => Thời gian chờ tối đa cho 1 lệnh Modbus TCP (đọc position/phát lệnh).
#   => GIẢM quá thấp (<1500ms): Dễ tuột cáp (Modbus giả lỗi) qua Switch LAN do ping spike.
#   => TĂNG quá cao (>10000ms): Nếu mạng rớt thật, Thread sẽ bị Treo Cứng ôm trọn Node gây đơ GUI.
# *Giải pháp an toàn hiện tại: Đã tách Thread _publish_positions ở Python Node,
#  timeout = 3000ms là đủ nhanh để văng lỗi mà luồng ROS không bị freeze.
# --------------------------------------------------------------------------
modbus_timeout_ms: 3000
# =============================================================================
# SENSOR CONFIGURATION — Cartridge Feeding System
# =============================================================================
# Phân chia:
# - CPX 253: Module 2 (I1.0-I1.7) và Module 3 (I2.0-I2.7)
# - CPX 254: Module 2 (I3.0-I3.7)
# =============================================================================

num_sensors: 22

sensor_type: PNP
sensor_logic: NO

sensors:
  # [CPX 253] MODULE 2: I1.0 -> I1.7
  - id: 1
    name: S1_BELT_START
    gui_label: "Belt start"
    cpx_ip: "192.168.27.253"
    cpx_channel: "I1.0"
    desc: "phát hiện khay ở đầu băng tải đầu vào"
    pos: pos1
    role: conveyor
    used_in: ['IDLE']
    active: true

  - id: 2
    name: S2_BELT_MID
