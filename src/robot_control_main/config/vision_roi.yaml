# ROI cho vision_decision_node — cham boi user 15/7/2026 bang roi_pick.py
# tren anh /camXHP/image_raw 640x480 (dung he toa do bbox YOLO publish).
#
# ref_width/ref_height = kich thuoc anh luc cham. Node scale ROI tu day sang
# image_width/image_height (param cua node). Binh thuong hai he trung nhau
# (scale 1.0) — neu doi output size camera thi chi can doi param, ROI tu gian.
#
# Cham lai: python3 ros2_ws/scripts/camera_tools/grab_roi_frames.py
#           python3 ros2_ws/scripts/camera_tools/roi_pick.py --cam camX
#           python3 ros2_ws/scripts/camera_tools/roi_preview.py --cam camX
# roi dan ket qua vao day, restart node (khong can build).
#
# Moi ROI = 4 goc [x, y] theo vong quanh (khong bat cheo).
# Thu tu slot1..slot10 = thu tu robot dat hang (khop pose index 14-23 trong
# joint_pose_params.yaml va nut O1-O10 tren GUI).

ref_width: 640
ref_height: 480

