yolo_parameters:
  imshow_isshow:
    type: bool
    description: "Enable or disable imshow."
    default_value: false
  model_path:
    type: string
    description: "Path to the model file."
    default_value: "example.onnx"
  class_labels_path:
    type: string
    description: "Path to the class labels file."
    default_value: ""
  conf:
    type: double
    description: "Confidence threshold."
    default_value: 0.3
  nms:
    type: double
    description: "NMS threshold."
    default_value: 0.45
  src_image_topic_name:
    type: string
    description: "Source image topic name."
    default_value: "image_raw"
  publish_image_topic_name:
    type: string
    description: "Publish image topic name."
    default_value: "yolox/image_raw"
  publish_boundingbox_topic_name:
    type: string
    description: "Publish bounding box topic name."
    default_value: "yolox/bounding_boxes"
  publish_resized_image:
    type: bool
    description: "Enable or disable resized image."
    default_value: false
  letterbox:
    type: bool
    description: "Preserve aspect ratio when resizing to the model input (pad with 114 instead of stretching). Required when the camera aspect ratio differs from the HEF input, e.g. 640x480 into 640x640."
    default_value: false